name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Fix project format for Xcode 15.4 compatibility
        run: |
          # Find the generated .xcodeproj (works whether it's at root or in PresidentSim/ subdir)
          PROJECT_DIR=$(find . -name "PresidentSim.xcodeproj" -type d | head -1)
          echo "Fixing project at: $PROJECT_DIR"
          sed -i '' 's/objectVersion = 77/objectVersion = 56/' "$PROJECT_DIR/project.pbxproj"

      - name: Build
        run: |
          PROJECT_DIR=$(find . -name "PresidentSim.xcodeproj" -type d | head -1)
          xcodebuild -project "$PROJECT_DIR" -scheme PresidentSim -configuration Debug build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO
