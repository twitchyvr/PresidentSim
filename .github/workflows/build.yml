name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Fix project format for Xcode 15.4 compatibility
        run: sed -i '' 's/objectVersion = 77/objectVersion = 56/' PresidentSim.xcodeproj/project.pbxproj

      - name: Build
        run: xcodebuild -project PresidentSim.xcodeproj -scheme PresidentSim -configuration Debug build CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO
